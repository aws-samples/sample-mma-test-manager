<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Loading Project</title>
    <style>
        body { font-family: Arial; margin: 40px; text-align: center; }
        .progress-container { width: 80%; margin: 30px auto; background: #f0f0f0; border-radius: 10px; padding: 3px; }
        .progress-bar { height: 30px; background: #007bff; border-radius: 8px; width: 0%; transition: width 0.3s; }
        .status { font-size: 18px; margin: 20px; color: #333; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Loading Project</h1>
    <div class="spinner"></div>
    <div class="status" id="status">Starting...</div>
    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>
    
    <script th:inline="javascript">
        const contextPath = /*[[@{/}]]*/ '';
        const projectId = /*[[${projectId}]]*/ '';
        
        function checkProgress() {
            fetch(contextPath + 'progress/' + projectId)
                .then(response => response.text())
                .then(data => {
                    document.getElementById('status').innerText = data;
                    
                    if (data.includes('%')) {
                        const match = data.match(/(\d+\.\d+)%/);
                        if (match) {
                            document.getElementById('progress').style.width = match[1] + '%';
                        }
                    }
                    
                    if (data.startsWith('COMPLETED')) {
                        document.getElementById('progress').style.width = '100%';
                        setTimeout(() => {
                            window.location.href = contextPath + 'project/' + projectId;
                        }, 1000);
                    } else if (data.startsWith('ERROR')) {
                        document.getElementById('status').style.color = 'red';
                    } else {
                        setTimeout(checkProgress, 500);
                    }
                });
        }
        
        checkProgress();
    </script>
</body>
</html>
