<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${kb.id == null ? 'Add Knowledge Base' : 'Edit Knowledge Base'}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>🗂️ MMA Test Manager</h1>
            <div class="header-nav">
                <a th:href="@{/}" class="btn btn-secondary btn-sm">Home</a>
                <a th:href="@{/knowledge-base}" class="btn btn-secondary btn-sm">Global Knowledge Base</a>
                <form method="post" th:action="@{/logout}" style="display: inline;">
                    <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2 th:text="${kb.id == null ? '➕ Add Knowledge Base' : '✏️ Edit Knowledge Base'}"></h2>
            </div>
            
            <form th:action="@{/knowledge-base/save}" th:object="${kb}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">
                
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="2" 
                              placeholder="Optional description of this knowledge base"></textarea>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Source Database Engine</label>
                        <select class="form-control" th:field="*{sourceDbEngine}" required>
                            <option value="">Select source database...</option>
                            <option value="oracle">Oracle</option>
                            <option value="sqlserver">SQL Server</option>
                            <option value="mysql">MySQL</option>
                            <option value="postgres">PostgreSQL</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Target Database Engine</label>
                        <select class="form-control" th:field="*{targetDbEngine}" required>
                            <option value="">Select target database...</option>
                            <option value="postgres">PostgreSQL</option>
                            <option value="mysql">MySQL</option>
                            <option value="oracle">Oracle</option>
                            <option value="sqlserver">SQL Server</option>
                        </select>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Categories (hold Ctrl/Cmd to select multiple)</label>
                        <select class="form-control" multiple size="3" name="categories" required 
                                style="height: auto;">
                            <option th:each="cat : ${ {'DDL_CONVERSION', 'UNIT_TEST', 'COMPARISON_TEST'} }"
                                    th:value="${cat}"
                                    th:text="${cat}"
                                    th:selected="${kb.categories != null && kb.categories.contains(cat)}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Priority</label>
                        <input type="number" class="form-control" th:field="*{priority}" value="0">
                        <small style="color: #6b7280;">Higher = applied first</small>
                    </div>
                    
                    <div class="form-group">
                        <label>Active</label>
                        <select class="form-control" th:field="*{active}">
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Knowledge Base Content</label>
                    <textarea class="form-control" th:field="*{content}" rows="15" required 
                              placeholder="Enter instructions, best practices, or guidelines that will be included in prompts..."
                              style="font-family: monospace; font-size: 13px;"></textarea>
                    <small style="color: #6b7280;">
                        This content will be automatically included in prompts when the source/target DB pair and category match.
                    </small>
                </div>
                
                <div style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Knowledge Base</button>
                    <a th:href="@{/knowledge-base}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
