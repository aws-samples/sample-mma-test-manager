spring.application.name=mma-test-manager
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
#spring.devtools.restart.enabled=false
#spring.devtools.livereload.enabled=false
server.port=8082
server.servlet.context-path=/

# Handle X-Forwarded-* headers from CloudFront/proxy
server.forward-headers-strategy=native

spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s


mma.security.username=admin
mma.security.password=YOUR_SECURE_PASSWORD_HERE

mma.repo.type=secretsmanager
mma.repo.secret=arn:aws:secretsmanager:<your-region>:123456789012:secret:<your-secret-name>

mma.s3.default-path=s3://<your-dms-bucket>/<your-project-path>
mma.kiro.command=kiro-cli chat --agent mma-agent --no-interactive
mma.kiro.max-retries=10

mma.sourcedb.connection.type=secretsmanager
mma.sourcedb.connection.secret=arn:aws:secretsmanager:<your-region>:123456789012:secret:<your-secret-name>

mma.targetdb.connection.type=secretsmanager
mma.targetdb.connection.secret=arn:aws:secretsmanager:<your-region>:123456789012:secret:<your-secret-name>

mma.sourcedb.test.type=secretsmanager
mma.sourcedb.test.secret=arn:aws:secretsmanager:<your-region>:123456789012:secret:<your-secret-name>

mma.targetdb.test.type=secretsmanager
mma.targetdb.test.secret=arn:aws:secretsmanager:<your-region>:123456789012:secret:<your-secret-name>
