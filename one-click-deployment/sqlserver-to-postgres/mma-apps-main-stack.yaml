Description: MMA Applications Deployment - Modular Architecture with Nested Stacks

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network Configuration
        Parameters:
          - VpcId
          - Ec2SubnetId
          - PrivSubnetId1
          - PrivSubnetId2
      - Label:
          default: Access Configuration
        Parameters:
          - UseCloudFront
          - AdminPassword
          - VSCodeUser
      - Label:
          default: EC2 Instance Configuration
        Parameters:
          - InstanceType
          - InstanceVolumeSize
          - KeyPairName
      - Label:
          default: Application Deployment
        Parameters:
          - StackPrefix
          - CodeURL
          - TemplateS3Bucket
          - TemplateS3Prefix
      - Label:
          default: Demo Infrastructure (Optional)
        Parameters:
          - DeployDemoInfra
          - DemoSQLScriptsURL
      - Label:
          default: Manual Database Configuration (If DeployDemoInfra=false)
        Parameters:
          - SQLServerSecretArn
          - PostgresSecretArn
          - SQLServerTestSecretArn
          - PostgresTestSecretArn
          - S3DMSProjectPath
    ParameterLabels:
      VpcId:
        default: VPC ID
      Ec2SubnetId:
        default: EC2 Public Subnet
      PrivSubnetId1:
        default: Private Subnet 1
      PrivSubnetId2:
        default: Private Subnet 2
      UseCloudFront:
        default: Use CloudFront Distribution
      AdminPassword:
        default: Admin Password
      VSCodeUser:
        default: VS Code Username
      InstanceType:
        default: Instance Type
      InstanceVolumeSize:
        default: Volume Size (GB)
      KeyPairName:
        default: EC2 Key Pair (Optional)
      StackPrefix:
        default: Stack Prefix
      CodeURL:
        default: Application Code URL
      TemplateS3Bucket:
        default: Templates S3 Bucket
      TemplateS3Prefix:
        default: Templates S3 Prefix
      DeployDemoInfra:
        default: Deploy Demo Infrastructure
      DemoSQLScriptsURL:
        default: Demo SQL Scripts URL
      SQLServerSecretArn:
        default: SQL Server Admin Secret ARN
      PostgresSecretArn:
        default: PostgreSQL Admin Secret ARN
      SQLServerTestSecretArn:
        default: SQL Server Test User Secret ARN
      PostgresTestSecretArn:
        default: PostgreSQL Test User Secret ARN
      S3DMSProjectPath:
        default: DMS Project S3 Path

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Select existing VPC
  
  Ec2SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Select public subnet for EC2 (Public subnet is required for Ngnix/CloudFront)
  
  PrivSubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: Select first subnet in different AZ (for Repo database and optional demo infra)

  PrivSubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Select second subnet in different AZ (for Repo database and optional demo infra)
  
  UseCloudFront:
    Type: String
    Description: Use CloudFront (true) or nginx (false)
    Default: 'false'
    AllowedValues: ['true', 'false']

  AdminPassword:
    Type: String
    Description: Password for VS Code and Test Manager login (min 8 chars, must include uppercase, lowercase, digit, and special character)
    NoEcho: true
    MinLength: 8
    AllowedPattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^a-zA-Z\d]).+$'
    ConstraintDescription: "Must be at least 8 characters and include uppercase, lowercase, digit, and special character. Avoid $, #, {, } as they may conflict with shell processing"
  
  VSCodeUser:
    Type: String
    Description: VS Code user name
    Default: awsmma

  InstanceType:
    Type: String
    Default: t3.large
  
  InstanceVolumeSize:
    Type: Number
    Default: 50
  
  KeyPairName:
    Type: String
    Default: ''

  StackPrefix:
    Type: String
    Default: mma
    AllowedPattern: ^[a-z0-9-]{3,20}$
  
  CodeURL:
    Type: String
    Description: HTTPS URL to application code zip (e.g., https://bucket.s3.region.amazonaws.com/mma-apps.zip)
    Default: 'https://ws-assets-prod-iad-r-iad-ed304a55c2ca1aee.s3.us-east-1.amazonaws.com/8fdbbd5d-8c0d-4395-976c-86466cd4f269/mma-apps.zip'
  
  TemplateS3Bucket:
    Type: String
    Description: S3 bucket containing nested stack templates
  
  TemplateS3Prefix:
    Type: String
    Description: S3 prefix for templates
    Default: mma-nested-stacks/

  DeployDemoInfra:
    Type: String
    Description: Deploy demo infrastructure (SQL Server, PostgreSQL, DMS)
    Default: 'false'
    AllowedValues: ['true', 'false']
  
  DemoSQLScriptsURL:
    Type: String
    Description: HTTPS URL to SQL scripts zip (required if DeployDemoInfra=true)
    Default: 'https://ws-assets-prod-iad-r-iad-ed304a55c2ca1aee.s3.us-east-1.amazonaws.com/8fdbbd5d-8c0d-4395-976c-86466cd4f269/sqlserver-scripts.zip'

  SQLServerSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing SQL Server admin credentials
    Default: ''
  PostgresSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing PostgreSQL admin credentials
    Default: ''
  SQLServerTestSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing SQL Server read-only user credentials
    Default: ''
  PostgresTestSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing PostgreSQL read-only user credentials
    Default: ''
  S3DMSProjectPath:
    Type: String
    Description: S3 path where DMS Schema Conversion project files are stored (e.g. s3://my-bucket/my-project, required if DeployDemoInfra=false)
    Default: ''
  S3DMSProjectBucket:
    Type: String
    Description: S3 bucket name containing DMS Schema Conversion project files (e.g. my-bucket, required if DeployDemoInfra=false)
    Default: ''

Conditions:
  DeployDemo: !Equals [!Ref DeployDemoInfra, 'true']
  NoDemo: !Not [!Equals [!Ref DeployDemoInfra, 'true']]
  UseCloudFront: !Equals [!Ref UseCloudFront, 'true']
  UseNginx: !Not [!Equals [!Ref UseCloudFront, 'true']]


Resources:
  ###############################################################################################
  ### IAM Resources
  ###############################################################################################
  
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: [ec2.amazonaws.com, ssm.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore
        - !Sub arn:${AWS::Partition}:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutSecretValue
                Resource: !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}-testmgr-db-secret*'
        - PolicyName: CloudFormationAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListStacks
                  - cloudformation:ListTypes
                Resource: '*'
        - PolicyName: SecretsManagerCMKAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:ReEncrypt*
                  - kms:CreateGrant
                  - kms:DescribeKey
                  - kms:GenerateDataKey*
                Resource: !GetAtt SecretsManagerCMK.Arn
  
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EC2Role]

  EC2DemoPolicy:
    Type: AWS::IAM::Policy
    Condition: DeployDemo
    Properties:
      PolicyName: !Sub '${StackPrefix}-ec2-demo-policy'
      Roles: [!Ref EC2Role]
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:PutSecretValue
            Resource:
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}-demo-secret-sqlserver-admin*'
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}-demo-secret-postgres-admin*'
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}-demo-sqlserver-ro-user*'
              - !Sub 'arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${StackPrefix}-demo-postgres-ro-user*'
          - Effect: Allow
            Action:
              - dms:DescribeConnections
              - dms:DescribeEndpoints
              - dms:DescribeReplicationInstances
              - dms:DescribeReplicationTasks
              - dms:DescribeMetadataModelAssessments
              - dms:DescribeMetadataModelConversions
              - dms:DescribeMetadataModelExportsToTarget
              - dms:DescribeDataProviders
              - dms:DescribeMigrationProjects
              - dms:ListMigrationProjects
              - dms:ListDataProviders
              - dms:ListMetadataModelAssessments
              - dms:ListMetadataModelConversions
              - dms:ListMetadataModelExports
              - dms:AddTagsToResource
            Resource: '*'
          - Effect: Allow
            Action:
              - dms:CreateReplicationTask
              - dms:TestConnection
            Resource:
              - !Sub 'arn:${AWS::Partition}:dms:${AWS::Region}:${AWS::AccountId}:endpoint:*'
              - !Sub 'arn:${AWS::Partition}:dms:${AWS::Region}:${AWS::AccountId}:rep:*'
            Condition:
              StringEquals:
                'aws:ResourceTag/Name':
                  - !Sub '${StackPrefix}-demo-sqlserver-source-endpoint'
                  - !Sub '${StackPrefix}-demo-postgres-target-endpoint'
                  - !Sub '${StackPrefix}-demo-dms-instance'
          - Effect: Allow
            Action:
              - dms:StartMetadataModelAssessment
              - dms:StartMetadataModelConversion
              - dms:StartMetadataModelExportToTarget
            Resource: !Sub 'arn:${AWS::Partition}:dms:${AWS::Region}:${AWS::AccountId}:migration-project:*'
            Condition:
              StringEquals:
                'aws:ResourceTag/Name': !Sub '${StackPrefix}-demo-dms-sc-migration-project'
          - Effect: Allow
            Action: dms:StartReplicationTask
            Resource: !Sub 'arn:${AWS::Partition}:dms:${AWS::Region}:${AWS::AccountId}:task:*'
            Condition:
              StringEquals:
                'aws:ResourceTag/Name': !Sub '${StackPrefix}-demo-data-migration-task'
          - Effect: Allow
            Action: [s3:GetObject, s3:ListBucket, s3:PutObject, s3:DeleteObject]
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${StackPrefix}-dms-sc-${AWS::AccountId}'
              - !Sub 'arn:${AWS::Partition}:s3:::${StackPrefix}-dms-sc-${AWS::AccountId}/*'

  EC2ManualPolicy:
    Type: AWS::IAM::Policy
    Condition: NoDemo
    Properties:
      PolicyName: !Sub '${StackPrefix}-ec2-manual-policy'
      Roles: [!Ref EC2Role]
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Action: [s3:GetObject, s3:ListBucket]
            Resource:
              - !Sub 'arn:${AWS::Partition}:s3:::${S3DMSProjectBucket}'
              - !Sub 'arn:${AWS::Partition}:s3:::${S3DMSProjectBucket}/*'

  SecretsManagerCMK:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'CMK for encrypting Secrets Manager secrets in ${StackPrefix}'
      EnableKeyRotation: true
      KeyPolicy:
        Id: secretsmanager-cmk-policy
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSecretsManagerAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId
                kms:ViaService: !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
          - Sid: AllowSecretsManagerGenerateDataKey
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:GenerateDataKey*'
            Resource: '*'
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId
              StringLike:
                kms:ViaService: !Sub 'secretsmanager.${AWS::Region}.amazonaws.com'
          - Sid: AllowS3Access
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:CallerAccount: !Ref AWS::AccountId
                kms:ViaService: !Sub 's3.${AWS::Region}.amazonaws.com'
          - Sid: AllowRootKeyAdministration
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  SecretsManagerCMKAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${StackPrefix}-secrets-cmk'
      TargetKeyId: !Ref SecretsManagerCMK

  
  ###############################################################################################
  ### Nested Stacks
  ###############################################################################################
  
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}network-stack.yaml'
      Parameters:
        VpcId: !Ref VpcId
        SubnetId: !Ref Ec2SubnetId
        StackPrefix: !Ref StackPrefix
      TimeoutInMinutes: 10
  
  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}database-stack.yaml'
      Parameters:
        VpcId: !Ref VpcId
        SubnetIds: !Join [',', [!Ref PrivSubnetId1, !Ref PrivSubnetId2]]
        SecurityGroupId: !GetAtt NetworkStack.Outputs.SecurityGroupId
        StackPrefix: !Ref StackPrefix
        KmsKeyId: !Ref SecretsManagerCMK
      TimeoutInMinutes: 30
  
  ComputeStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}compute-stack.yaml'
      Parameters:
        SubnetId: !Ref Ec2SubnetId
        SecurityGroupId: !GetAtt NetworkStack.Outputs.SecurityGroupId
        InstanceType: !Ref InstanceType
        VolumeSize: !Ref InstanceVolumeSize
        KeyPairName: !Ref KeyPairName
        StackPrefix: !Ref StackPrefix
        IAMRoleArn: !GetAtt EC2Role.Arn
        IAMInstanceProfile: !Ref EC2InstanceProfile
      TimeoutInMinutes: 15
  
  DemoInfraStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployDemo
    DependsOn: [ComputeStack]
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}demo-infrastructure.yaml'
      Parameters:
        VpcId: !Ref VpcId
        SubnetIds: !Join [',', [!Ref PrivSubnetId1, !Ref PrivSubnetId2]]
        EC2SecurityGroupId: !GetAtt NetworkStack.Outputs.SecurityGroupId        
        StackPrefix: !Ref StackPrefix
        DemoSQLScriptsURL: !Ref DemoSQLScriptsURL
        KmsKeyId: !Ref SecretsManagerCMK
        KmsKeyArn: !GetAtt SecretsManagerCMK.Arn
      TimeoutInMinutes: 60


  ApplicationSetupStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [ComputeStack, DatabaseStack]
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}application-setup.yaml'
      Parameters:
        StackPrefix: !Ref StackPrefix
        SecurityGroupId: !GetAtt NetworkStack.Outputs.SecurityGroupId
        UseCloudFront: !Ref UseCloudFront
        EC2InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
        PublicDnsName: !GetAtt ComputeStack.Outputs.PublicDnsName   
      TimeoutInMinutes: 20

  SSMWaiterStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}ssm-waiter-stack.yaml'
      Parameters:
        StackPrefix: !Ref StackPrefix
      TimeoutInMinutes: 5
  

  
  ###############################################################################################
  ### Database and Application Setup
  ###############################################################################################
  
  RunEC2BaseSetup:
    Type: Custom::SSMWaiter
    DependsOn: [ComputeStack, SSMWaiterStack]
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt ComputeStack.Outputs.SetupEC2BaseDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        AdminPassword: [!Ref AdminPassword]
        VSCodeUser: [!Ref VSCodeUser]
      Timeout: 900

  RunRepoDatabaseSetup:
    Type: Custom::SSMWaiter
    DependsOn: [DatabaseStack, RunEC2BaseSetup]
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt DatabaseStack.Outputs.SetupDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Timeout: 300

  RunDemoSetupEnvironment:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: [DemoInfraStack, RunRepoDatabaseSetup]
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt DemoInfraStack.Outputs.SetupEnvironmentDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        SQLScriptsURL: [!Ref DemoSQLScriptsURL]
        VSCodeUser: [!Ref VSCodeUser]
      Timeout: 600

  RunDemoSQLServerSchema:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: RunDemoSetupEnvironment
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt DemoInfraStack.Outputs.DeploySQLServerSchemaDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        VSCodeUser: [!Ref VSCodeUser]
      Timeout: 600

  RunDemoPostgresSchema:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: RunDemoSQLServerSchema
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt DemoInfraStack.Outputs.DeployPostgresSchemaDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Timeout: 600

  RunDMSSchemaConversion:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: RunDemoPostgresSchema
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt DemoInfraStack.Outputs.DMSSchemaConversionDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Timeout: 900

  RunDMSDataMigration:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: RunDMSSchemaConversion
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt DemoInfraStack.Outputs.DMSDataMigrationDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Timeout: 900

  RunApplicationDeployment:
    Type: Custom::SSMWaiter
    DependsOn: RunRepoDatabaseSetup
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt ApplicationSetupStack.Outputs.ApplicationDeploymentDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        CodeURL: [!Ref CodeURL]
        VSCodeUser: [!Ref VSCodeUser]
      Timeout: 900

  RunConfigureDemoInfraSecrets:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: [RunApplicationDeployment, RunDMSDataMigration]
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt ApplicationSetupStack.Outputs.ConfigureDemoInfraSecretsDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        RepoDBSecretArn: [!GetAtt DatabaseStack.Outputs.DBSecretArn]
        AdminPassword: [!Ref AdminPassword]
        VSCodeUser: [!Ref VSCodeUser]
        DemoInfraStackName: [!GetAtt DemoInfraStack.Outputs.StackName]
      Timeout: 300

  RunApplicationPostDeploymentWithDemo:
    Type: Custom::SSMWaiter
    Condition: DeployDemo
    DependsOn: RunConfigureDemoInfraSecrets
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt ApplicationSetupStack.Outputs.ApplicationPostDeploymentDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        UseCloudFront: [!If [UseCloudFront, 'true', 'false']]
        VSCodeUser: [!Ref VSCodeUser]
      Timeout: 300

  RunConfigureManualInfraSecrets:
    Type: Custom::SSMWaiter
    Condition: NoDemo
    DependsOn: RunApplicationDeployment
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt ApplicationSetupStack.Outputs.ConfigureManualInfraSecretsDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        RepoDBSecretArn: [!GetAtt DatabaseStack.Outputs.DBSecretArn]
        AdminPassword: [!Ref AdminPassword]
        VSCodeUser: [!Ref VSCodeUser]
        SQLServerSecretArn: [!Ref SQLServerSecretArn]
        PostgresSecretArn: [!Ref PostgresSecretArn]
        SQLServerTestSecretArn: [!Ref SQLServerTestSecretArn]
        PostgresTestSecretArn: [!Ref PostgresTestSecretArn]
        S3DMSProjectPath: [!Ref S3DMSProjectPath]
      Timeout: 300

  RunApplicationPostDeploymentWithManual:
    Type: Custom::SSMWaiter
    Condition: NoDemo
    DependsOn: RunConfigureManualInfraSecrets
    Properties:
      ServiceToken: !GetAtt SSMWaiterStack.Outputs.SSMWaiterFunctionArn
      DocumentName: !GetAtt ApplicationSetupStack.Outputs.ApplicationPostDeploymentDocumentName
      InstanceId: !GetAtt ComputeStack.Outputs.InstanceId
      Parameters:
        UseCloudFront: [!If [UseCloudFront, 'true', 'false']]
        VSCodeUser: [!Ref VSCodeUser]
      Timeout: 300

Outputs:
  InstanceId:
    Value: !GetAtt ComputeStack.Outputs.InstanceId
  
  PrivateIP:
    Value: !GetAtt ComputeStack.Outputs.PrivateIp
  
  PublicIP:
    Condition: UseNginx
    Value: !GetAtt ComputeStack.Outputs.PublicIp
  
  TestManagerURL:
    Condition: UseNginx
    Value: !Sub 'https://${ComputeStack.Outputs.PublicIp}'
    Description: Test Manager login with admin/AdminPassword
  
  CodeServerURL:
    Condition: UseNginx
    Value: !Sub 'https://${ComputeStack.Outputs.PublicIp}/code/?folder=/workshop/MMA-Test-Manager'
    Description: VS Code login with AdminPassword

  CloudFrontTestManagerURL:
    Condition: UseCloudFront
    Value: !Sub 'https://${ApplicationSetupStack.Outputs.CloudFrontDistributionDomain}'
    Description: Test Manager via CloudFront - login with admin/AdminPassword
  
  CloudFrontCodeServerURL:
    Condition: UseCloudFront
    Value: !Sub 'https://${ApplicationSetupStack.Outputs.CloudFrontDistributionDomain}/code/?folder=/workshop/MMA-Test-Manager'
    Description: VS Code via CloudFront - login with AdminPassword
  
  RepoDBEndpoint:
    Value: !GetAtt DatabaseStack.Outputs.DBEndpoint
  
  DemoSQLServerEndpoint:
    Condition: DeployDemo
    Description: SQL Server RDS endpoint for demo
    Value: !GetAtt DemoInfraStack.Outputs.SQLServerEndpoint
  
  DemoPostgresEndpoint:
    Condition: DeployDemo
    Description: Aurora PostgreSQL endpoint for demo
    Value: !GetAtt DemoInfraStack.Outputs.PostgresEndpoint
  
  SQLServerAdminSecretArn:
    Condition: DeployDemo
    Description: SQL Server admin credentials secret ARN
    Value: !GetAtt DemoInfraStack.Outputs.SQLServerAdminSecretArn
  
  PostgresAdminSecretArn:
    Condition: DeployDemo
    Description: PostgreSQL admin credentials secret ARN
    Value: !GetAtt DemoInfraStack.Outputs.PostgresAdminSecretArn

  SQLServerTestUserSecretArn:
    Condition: DeployDemo
    Description: SQL Server test credentials secret ARN
    Value: !GetAtt DemoInfraStack.Outputs.SQLServerTestUserSecretArn
  
  PostgresTestUserSecretArn:
    Condition: DeployDemo
    Description: PostgreSQL test credentials secret ARN
    Value: !GetAtt DemoInfraStack.Outputs.PostgresTestUserSecretArn
