Description: Application setup SSM document for MMA applications

Parameters:
  StackPrefix:
    Type: String
  UseCloudFront:
    Type: String
    Default: 'false'
  EC2InstanceId:
    Type: String
  SecurityGroupId:
    Type: String
  PublicDnsName:
    Type: String  

Conditions:
  UseCloudFrontDistribution: !Equals [!Ref UseCloudFront, 'true']

Mappings:
  AWSRegionsPrefixListID:
    us-east-1:
      PrefixList: pl-3b927c52
    us-east-2:
      PrefixList: pl-b6a144df
    us-west-1:
      PrefixList: pl-4ea04527
    us-west-2:
      PrefixList: pl-82a045eb
    ap-northeast-1:
      PrefixList: pl-58a04531
    ap-northeast-2:
      PrefixList: pl-22a6434b
    ap-south-1:
      PrefixList: pl-9aa247f3
    ap-southeast-1:
      PrefixList: pl-31a34658
    ap-southeast-2:
      PrefixList: pl-b8a742d1
    ca-central-1:
      PrefixList: pl-38a64351
    eu-central-1:
      PrefixList: pl-a3a144ca
    eu-north-1:
      PrefixList: pl-fab65393
    eu-west-1:
      PrefixList: pl-4fa04526
    eu-west-2:
      PrefixList: pl-93a247fa
    eu-west-3:
      PrefixList: pl-75b1541c
    sa-east-1:
      PrefixList: pl-5da64334

Resources:

  CloudFrontCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Condition: UseCloudFrontDistribution
    Properties:
      CachePolicyConfig:
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 1
        Name: !Ref SecurityGroupId
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: all
          EnableAcceptEncodingGzip: false
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Accept-Charset
              - Authorization
              - Origin
              - Accept
              - Referer
              - Host
              - Accept-Language
              - Accept-Encoding
              - Accept-Datetime
          QueryStringsConfig:
            QueryStringBehavior: all

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: UseCloudFrontDistribution
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W70
            reason: "CloudFront default certificate enforces TLSv1. TLS 1.2 requires custom certificate with SNI."
          - id: W10
            reason: "Access logging not required for demo environment. Enable in production with S3 bucket for logs."
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultCacheBehavior:
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
          CachePolicyId: !Ref CloudFrontCachePolicy
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
          TargetOriginId: !Sub '${AWS::StackName}-origin'
          ViewerProtocolPolicy: https-only
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        Origins:
          - DomainName: !Ref PublicDnsName
            Id: !Sub '${AWS::StackName}-origin'
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 120
              OriginKeepaliveTimeout: 60

  EC2SecurityGroupIngressCloudFront:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: UseCloudFrontDistribution
    Properties:
      GroupId: !Ref SecurityGroupId
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourcePrefixListId: !FindInMap [AWSRegionsPrefixListID, !Ref 'AWS::Region', PrefixList]
      Description: Allow HTTP from CloudFront

  ApplicationDeploymentDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-application-deploy'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Setup MMA applications (Download and Deploy)
        parameters:
          CodeURL:
            type: String
          VSCodeUser:
            type: String
            default: 'awsmma'
        mainSteps:
          - name: DownloadCode
            action: aws:runShellScript
            inputs:
              runCommand:
                - mkdir -p /workshop
                - wget -q -O /tmp/mma-apps.zip "{{ CodeURL }}"
                - unzip -o /tmp/mma-apps.zip -d /workshop/MMA-Test-Manager
                - chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /workshop
                - ln -sf /workshop/MMA-Test-Manager /home/{{ VSCodeUser }}/workspace
                - mkdir -p /var/log/mma-apps
                - chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /var/log/mma-apps
          
          - name: BuildApplications
            action: aws:runShellScript
            inputs:
              runCommand:
                - |
                  su - {{ VSCodeUser }} <<'EOFBUILD'
                  export PATH=/usr/share/maven/bin:/usr/bin:/usr/local/bin:$PATH
                  cd /workshop/MMA-Test-Manager
                  ./build-all.sh > /var/log/mma-apps/build.log 2>&1
                  echo "Build completed at $(date)" >> /var/log/mma-apps/build.log
                  echo "Last few lines of messages for build.log::"
                  tail -n 15 /var/log/mma-apps/build.log"
                  EOFBUILD
                - echo 'export PATH=/usr/share/maven/bin:$PATH' >> /home/{{ VSCodeUser }}/.bashrc

  ConfigureDemoInfraSecretsDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-configure-demo-infra-secrets'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Configure Secerts from Demo Infra
        parameters:
          DemoInfraStackName:
            type: String
            default: ''
          RepoDBSecretArn:
            type: String
            default: ''
          AdminPassword:
            type: String
          VSCodeUser:
            type: String
            default: 'awsmma'
        mainSteps:          
          - name: ConfigureDemoInfraSecrets
            action: aws:runShellScript
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  REGION=${AWS::Region}
                  DEMO_STACK="{{ DemoInfraStackName }}"
                  
                  if [ -z "$DEMO_STACK" ]; then
                    echo "Demo infrastructure stack name not provided, skipping configuration"
                    exit 0
                  fi
                  
                  echo "Fetching secrets from demo infrastructure stack: $DEMO_STACK"
                  
                  # Get secret ARNs from stack outputs
                  SQLSERVER_SECRET_ARN=$(aws cloudformation describe-stacks --stack-name $DEMO_STACK --region $REGION --query "Stacks[0].Outputs[?OutputKey=='SQLServerAdminSecretArn'].OutputValue" --output text)
                  PG_SECRET_ARN=$(aws cloudformation describe-stacks --stack-name $DEMO_STACK --region $REGION --query "Stacks[0].Outputs[?OutputKey=='PostgresAdminSecretArn'].OutputValue" --output text)
                  SQLSERVER_TEST_SECRET_ARN=$(aws cloudformation describe-stacks --stack-name $DEMO_STACK --region $REGION --query "Stacks[0].Outputs[?OutputKey=='SQLServerTestUserSecretArn'].OutputValue" --output text)
                  PG_TEST_SECRET_ARN=$(aws cloudformation describe-stacks --stack-name $DEMO_STACK --region $REGION --query "Stacks[0].Outputs[?OutputKey=='PostgresTestUserSecretArn'].OutputValue" --output text)
                  
                  # Get S3 bucket from DMS migration project
                  DMS_PROJECT=${StackPrefix}-demo-dms-sc-migration-project
                  S3_BUCKET=$(aws dms describe-migration-projects --region $REGION --query "MigrationProjects[?MigrationProjectName=='$DMS_PROJECT'].SchemaConversionApplicationAttributes.S3BucketPath" --output text 2>/dev/null || echo "")
                  S3_PATH="s3://$S3_BUCKET/$DMS_PROJECT"
                  echo "SQL Server Secret: $SQLSERVER_SECRET_ARN"
                  echo "PostgreSQL Secret: $PG_SECRET_ARN"
                  echo "SQL Server Test Secret: $SQLSERVER_TEST_SECRET_ARN"
                  echo "PostgreSQL Test Secret: $PG_TEST_SECRET_ARN"
                  echo "S3 Bucket Path: $S3_PATH"
                  
                  # Configure MCP servers
                  su - {{ VSCodeUser }} <<EOFMCP
                  cd /workshop/MMA-Test-Manager
                  
                  # SQL Server MCP
                  sed -i.bak "s|mcp.db.connection.detail=.*|mcp.db.connection.detail=$SQLSERVER_SECRET_ARN|g" sqlserver-client-mcp/application-secretsmanager.properties
                  
                  # PostgreSQL MCP
                  sed -i.bak "s|mcp.db.connection.detail=.*|mcp.db.connection.detail=$PG_SECRET_ARN|g" postgres-client-mcp/application-secretsmanager.properties
                  sed -i.bak "s|mcp.db.connection.readonly=.*|mcp.db.connection.readonly=false|g" postgres-client-mcp/application-secretsmanager.properties

                  # Configure Kiro CLI agent  
                  mkdir -p ~/.kiro/agents/
                  cp ./docs/sample-sqlserver-postgres-mma-agent-for-kiro-cli.json ~/.kiro/agents/mma-agent.json 2>/dev/null || true
                  sed -i "s|MMA-Samples|MMA-Test-Manager|g" ~/.kiro/agents/mma-agent.json

                  echo "MCP servers configured"
                  EOFMCP



                  # Update test manager configuration with demo secrets
                  cat > /workshop/MMA-Test-Manager/mma-test-manager/application-secretsmanager.properties <<EOFTM
                  spring.application.name=mma-test-manager
                  spring.jpa.hibernate.ddl-auto=update
                  spring.flyway.enabled=true
                  spring.flyway.baseline-on-migrate=true
                  spring.devtools.restart.enabled=false
                  spring.devtools.livereload.enabled=false
                  server.port=8082
                  server.servlet.context-path=/
                  
                  # Handle X-Forwarded-* headers from CloudFront/proxy
                  server.forward-headers-strategy=native

                  mma.security.username=admin
                  mma.security.password={{ AdminPassword }}
                  
                  mma.repo.type=secretsmanager
                  mma.repo.secret={{ RepoDBSecretArn }}

                  mma.s3.default-path=$S3_PATH
                  mma.kiro.command=/home/{{ VSCodeUser }}/.local/bin/kiro-cli chat --agent mma-agent --no-interactive
                  mma.kiro.max-retries=10
                  
                  mma.sourcedb.connection.type=secretsmanager
                  mma.sourcedb.connection.secret=$SQLSERVER_SECRET_ARN
                  
                  mma.targetdb.connection.type=secretsmanager
                  mma.targetdb.connection.secret=$PG_SECRET_ARN
                  
                  mma.sourcedb.test.type=secretsmanager
                  #mma.sourcedb.test.secret=$SQLSERVER_TEST_SECRET_ARN
                  mma.sourcedb.test.secret=$SQLSERVER_SECRET_ARN

                  mma.targetdb.test.type=secretsmanager
                  #mma.targetdb.test.secret=$PG_TEST_SECRET_ARN
                  mma.targetdb.test.secret=$PG_SECRET_ARN
                  EOFTM
                  
                  chown {{ VSCodeUser }}:{{ VSCodeUser }} /workshop/MMA-Test-Manager/mma-test-manager/application-secretsmanager.properties
                  
                  echo "Demo infrastructure secrets configured successfully"

  ConfigureManualInfraSecretsDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-configure-manual-infra-secrets'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Configure Secerts from Manual Infra from Input
        parameters:
          SQLServerSecretArn:
            type: String
            default: ''
          PostgresSecretArn:
            type: String
            default: ''
          SQLServerTestSecretArn:
            type: String
            default: ''
          PostgresTestSecretArn:
            type: String
            default: ''
          S3DMSProjectPath:
            type: String
            default: ''
          RepoDBSecretArn:
            type: String
            default: ''
          AdminPassword:
            type: String
          VSCodeUser:
            type: String
            default: 'awsmma'
        mainSteps:
          - name: ConfigureManualSecrets
            action: aws:runShellScript
            inputs:
              runCommand:
                - |
                  #!/bin/bash
                  
                  SQLSERVER_SECRET_ARN="{{ SQLServerSecretArn }}"
                  PG_SECRET_ARN="{{ PostgresSecretArn }}"
                  SQLSERVER_TEST_SECRET_ARN="{{ SQLServerTestSecretArn }}"
                  PG_TEST_SECRET_ARN="{{ PostgresTestSecretArn }}"
                  S3_PATH="{{ S3DMSProjectPath }}"
                  # Configure MCP servers if secrets provided
                  if [ -n "$SQLSERVER_SECRET" ] && [ -n "$PG_SECRET" ]; then
                  su - {{ VSCodeUser }} <<EOFMCP
                  cd /workshop/MMA-Test-Manager
                    
                    sed -i.bak "s|mcp.db.connection.detail=.*|mcp.db.connection.detail=$SQLSERVER_SECRET|g" sqlserver-client-mcp/application-secretsmanager.properties
                    sed -i.bak "s|mcp.db.connection.detail=.*|mcp.db.connection.detail=$PG_SECRET|g" postgres-client-mcp/application-secretsmanager.properties
                    sed -i.bak "s|mcp.db.connection.readonly=.*|mcp.db.connection.readonly=false|g" postgres-client-mcp/application-secretsmanager.properties

                    EOFMCP
                    
                    echo "MCP servers configured with provided secrets"
                  fi

                  su - {{ VSCodeUser }} <<EOFKIRO
                  cd /workshop/MMA-Test-Manager
                  # Configure Kiro CLI agent  
                  mkdir -p ~/.kiro/agents/
                  cp ./docs/sample-sqlserver-postgres-mma-agent-for-kiro-cli.json ~/.kiro/agents/mma-agent.json 2>/dev/null || true
                  sed -i "s|MMA-Samples|MMA-Test-Manager|g" ~/.kiro/agents/mma-agent.json
                  EOFKIRO
                  echo "Kiro configured with mma-agent"

                  # Update test manager with provided secrets
                  cat > /workshop/MMA-Test-Manager/mma-test-manager/application-secretsmanager.properties <<EOFTM
                  spring.application.name=mma-test-manager
                  spring.jpa.hibernate.ddl-auto=update
                  spring.flyway.enabled=true
                  spring.flyway.baseline-on-migrate=true
                  spring.devtools.restart.enabled=false
                  spring.devtools.livereload.enabled=false
                  server.port=8082
                  server.servlet.context-path=/

                  # Handle X-Forwarded-* headers from CloudFront/proxy
                  server.forward-headers-strategy=native
                                    
                  mma.security.username=admin
                  mma.security.password={{ AdminPassword }}
                  
                  mma.repo.type=secretsmanager
                  mma.repo.secret={{ RepoDBSecretArn }}

                  mma.s3.default-path=$S3_PATH
                  mma.kiro.command=/home/{{ VSCodeUser }}/.local/bin/kiro-cli chat --agent mma-agent --no-interactive
                  mma.kiro.max-retries=10
                  
                  mma.sourcedb.connection.type=secretsmanager
                  mma.sourcedb.connection.secret=$SQLSERVER_SECRET_ARN
                  
                  mma.targetdb.connection.type=secretsmanager
                  mma.targetdb.connection.secret=$PG_SECRET_ARN
                  
                  mma.sourcedb.test.type=secretsmanager
                  #mma.sourcedb.test.secret=$SQLSERVER_TEST_SECRET_ARN
                  mma.sourcedb.test.secret=$SQLSERVER_SECRET_ARN

                  mma.targetdb.test.type=secretsmanager
                  #mma.targetdb.test.secret=$PG_TEST_SECRET_ARN
                  mma.targetdb.test.secret=$PG_SECRET_ARN

                  EOFTM
                  
                  chown {{ VSCodeUser }}:{{ VSCodeUser }} /workshop/MMA-Test-Manager/mma-test-manager/application-secretsmanager.properties
                  
                  echo "Manual secrets configured"

  ApplicationPostDeploymentDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-application-post-deploy'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Start Applicaiton and Configure Ngnix/Cloudfront Proxy
        parameters:
          VSCodeUser:
            type: String
            default: 'awsmma'
          UseCloudFront:
            type: String
            default: 'false'            
        mainSteps:          
          - name: StartApplications
            action: aws:runShellScript
            inputs:
              runCommand:
                - |
                  cat > /etc/systemd/system/mma-test-manager.service <<'EOF'
                  [Unit]
                  Description=MMA Test Manager
                  After=network.target
                  
                  [Service]
                  Type=simple
                  User={{ VSCodeUser }}
                  WorkingDirectory=/workshop/MMA-Test-Manager/mma-test-manager
                  ExecStart=/usr/bin/java -jar target/mma-test-manager.jar --spring.config.location=application-secretsmanager.properties
                  Restart=on-failure
                  RestartSec=10
                  StandardOutput=append:/var/log/mma-apps/mma-test-manager.log
                  StandardError=append:/var/log/mma-apps/mma-test-manager-error.log
                  
                  [Install]
                  WantedBy=multi-user.target
                  EOF
                  
                  systemctl daemon-reload
                  systemctl enable mma-test-manager
                  systemctl start mma-test-manager
                  
                  echo "Application started at $(date)" >> /var/log/mma-apps/startup.log
          
          - name: SetupCloudFrontNginx
            action: aws:runShellScript
            precondition:
              StringEquals: ['{{ UseCloudFront }}', 'true']
            inputs:
              runCommand:
                - |
                  cat > /etc/nginx/conf.d/mma-apps.conf <<'EOF'
                  server {
                      listen 80;
                      listen [::]:80;
                      server_name *.cloudfront.net;
                      
                      # VS Code Server
                      location /code/ {
                          proxy_pass http://localhost:8080/;
                          proxy_set_header Host $host;
                          proxy_set_header X-Forwarded-Proto https;
                          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                          proxy_set_header Upgrade $http_upgrade;
                          proxy_set_header Connection upgrade;
                          proxy_set_header Accept-Encoding gzip;
                      }
                      
                      # Test Manager
                      location / {
                          proxy_pass http://localhost:8082;
                          proxy_set_header Host $host;
                          proxy_set_header X-Real-IP $remote_addr;
                          proxy_set_header X-Forwarded-Proto https;
                          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      }
                  }
                  EOF
                - systemctl enable nginx
                - systemctl restart nginx

          - name: SetupNginx
            action: aws:runShellScript
            precondition:
              StringEquals: ['{{ UseCloudFront }}', 'false']
            inputs:
              runCommand:
                - mkdir -p /etc/nginx/ssl
                - |
                  openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                    -keyout /etc/nginx/ssl/nginx-selfsigned.key \
                    -out /etc/nginx/ssl/nginx-selfsigned.crt \
                    -subj "/C=US/ST=State/L=City/O=Organization/CN=mma-apps"
                - |
                  cat > /etc/nginx/conf.d/mma-apps.conf <<'EOF'
                  server {
                      listen 80;
                      return 301 https://$host$request_uri;
                  }
                  
                  server {
                      listen 443 ssl;
                      ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
                      ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
                      ssl_protocols TLSv1.2 TLSv1.3;
                      
                      # VS Code Server
                      location /code/ {
                          proxy_pass http://localhost:8080/;
                          proxy_set_header Host $host;
                          proxy_set_header Upgrade $http_upgrade;
                          proxy_set_header Connection upgrade;
                          proxy_set_header Accept-Encoding gzip;
                      }
                      
                      # Test Manager
                      location / {
                          proxy_pass http://localhost:8082;
                          proxy_set_header Host $host;
                          proxy_set_header X-Real-IP $remote_addr;
                      }
                  }
                  EOF
                - systemctl enable nginx
                - systemctl restart nginx

Outputs:
  ApplicationDeploymentDocumentName:
    Description: SSM document name
    Value: !Ref ApplicationDeploymentDocument
    Export:
      Name: !Sub '${AWS::StackName}-ApplicationDeploymentSSMDoc'

  ConfigureDemoInfraSecretsDocumentName:
    Description: SSM document name
    Value: !Ref ConfigureDemoInfraSecretsDocument
    Export:
      Name: !Sub '${AWS::StackName}-ConfigureDemoSecretsSSMDoc'

  ConfigureManualInfraSecretsDocumentName:
    Description: SSM document name
    Value: !Ref ConfigureManualInfraSecretsDocument
    Export:
      Name: !Sub '${AWS::StackName}-ConfigureManualSecretsSSMDoc'

  ApplicationPostDeploymentDocumentName:
    Description: SSM document name
    Value: !Ref ApplicationPostDeploymentDocument
    Export:
      Name: !Sub '${AWS::StackName}-ApplicationPostDeploymentSSMDoc'

  CloudFrontDistributionDomain:
    Condition: UseCloudFrontDistribution
    Description: CloudFront distribution domain
    Value: !GetAtt CloudFrontDistribution.DomainName
