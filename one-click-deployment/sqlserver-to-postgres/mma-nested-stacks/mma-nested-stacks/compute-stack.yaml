Description: EC2 instance with MMA applications

Parameters:

  SubnetId:
    Type: AWS::EC2::Subnet::Id
  
  SecurityGroupId:
    Type: String
  
  InstanceType:
    Type: String
    Default: t3.large
  
  VolumeSize:
    Type: Number
    Default: 50
  
  KeyPairName:
    Type: String
    Default: ''
  
  StackPrefix:
    Type: String
  
  IAMRoleArn:
    Type: String
  
  IAMInstanceProfile:
    Type: String
    Description: IAM instance profile name

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]


Resources:
  EC2Instance:
    #checkov:skip=CKV_AWS_88:Public IP required for demo environment access
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref IAMInstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref AWS::NoValue]
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          DeleteOnTermination: true
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref SecurityGroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y amazon-ssm-agent
          systemctl enable amazon-ssm-agent
          systemctl start amazon-ssm-agent
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-mma-apps-server'

  SetupEC2BaseDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-setup-ec2-software'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Setup database client on ec2
        parameters:
          AdminPassword:
            type: String
          VSCodeUser:
            type: String
            default: 'awsmma'
        mainSteps:
          - name: AddUserVSCodeUser
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - !Sub |
                  echo 'Adding user: {{ VSCodeUser }}'
                  adduser -c '' {{ VSCodeUser }}
                  passwd -l {{ VSCodeUser }}
                  echo "{{ VSCodeUser }}:{{ AdminPassword }}" | chpasswd
                  usermod -aG wheel {{ VSCodeUser }}
                - !Sub |
                  tee /etc/sudoers.d/91-vscode-user <<EOF
                  {{ VSCodeUser }} ALL=(ALL) NOPASSWD:ALL
                  EOF
                - !Sub mkdir -p /home/{{ VSCodeUser }} && chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /home/{{ VSCodeUser }}
                - !Sub mkdir -p /home/{{ VSCodeUser }}/.local/bin && chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /home/{{ VSCodeUser }}
                - echo "User added. Checking configuration"
                - !Sub getent passwd {{ VSCodeUser }}
          - name: UpdateProfileVSCodeUser
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - echo LANG=en_US.utf-8 >> /etc/environment
                - echo LC_ALL=en_US.UTF-8 >> /etc/environment
                - !Sub echo 'PATH=$PATH:/home/{{ VSCodeUser }}/.local/bin' >> /home/{{ VSCodeUser }}/.bashrc
                - !Sub echo 'export PATH' >> /home/{{ VSCodeUser }}/.bashrc
                - !Sub echo 'export AWS_REGION=${AWS::Region}' >> /home/{{ VSCodeUser }}/.bashrc
                - !Sub echo 'export AWS_ACCOUNTID=${AWS::AccountId}' >> /home/{{ VSCodeUser }}/.bashrc
                - !Sub echo 'export NEXT_TELEMETRY_DISABLED=1' >> /home/{{ VSCodeUser }}/.bashrc
                - !Sub echo "export PS1='\[\033[01;32m\]\u:\[\033[01;34m\]\w\[\033[00m\]\$ '" >> /home/{{ VSCodeUser }}/.bashrc
                - !Sub chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /home/{{ VSCodeUser }}
          - name: InstallBasePackages
            action: aws:runShellScript
            inputs:
              runCommand:
                - '#!/bin/bash'
                - !Sub |
                  echo "=========================================="
                  # Required packages installation
                  echo "Install java-21 git maven wget zip unzip"
                  dnf install -y java-21-amazon-corretto-devel java-21-amazon-corretto git maven-amazon-corretto21 wget zip unzip nginx curl-minimal gnupg whois argon2 openssl
                  echo "=========================================="
          - name: InstallAWSCLI
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 300
              runCommand:
                - '#!/bin/bash'
                - mkdir -p /tmp
                - curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-$(uname -m).zip -o /tmp/aws-cli.zip
                - !Sub chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /tmp/aws-cli.zip
                - unzip -q -d /tmp /tmp/aws-cli.zip
                - sudo /tmp/aws/install
                - rm -rf /tmp/aws
                - echo "AWS CLI installed. Checking configuration"
                - aws --version
          - name: ConfigureCodeServer
            action: aws:runShellScript
            inputs:
              timeoutSeconds: 600
              runCommand:
                - '#!/bin/bash'
                - !Sub export HOME=/home/{{ VSCodeUser }}
                - curl -fsSL https://code-server.dev/install.sh | bash -s -- 2>&1
                - !Sub systemctl enable --now code-server@{{ VSCodeUser }} 2>&1

                - !Sub mkdir -p /home/{{ VSCodeUser }}/.config/code-server
                - !Sub |
                  tee /home/{{ VSCodeUser }}/.config/code-server/config.yaml <<EOF
                  cert: false
                  auth: password
                  hashed-password: "$(echo -n {{ AdminPassword }} | argon2 $(openssl rand -base64 12) -e)"
                  EOF
                - !Sub mkdir -p /home/{{ VSCodeUser }}/.local/share/code-server/User/
                - !Sub touch /home/{{ VSCodeUser }}/.hushlogin
                - !Sub mkdir -p /workshop && chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /workshop
                - !Sub |
                  tee /home/{{ VSCodeUser }}/.local/share/code-server/User/settings.json <<EOF
                  {
                    "extensions.autoUpdate": false,
                    "extensions.autoCheckUpdates": false,
                    "telemetry.telemetryLevel": "off",
                    "security.workspace.trust.startupPrompt": "never",
                    "security.workspace.trust.enabled": false,
                    "security.workspace.trust.banner": "never",
                    "security.workspace.trust.emptyWindow": false,
                    "auto-run-command.rules": [
                      {
                        "command": "workbench.action.terminal.new"
                      }
                    ]
                  }
                  EOF
                - !Sub chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /home/{{ VSCodeUser }}
                - !Sub systemctl restart code-server@{{ VSCodeUser }}
                - systemctl restart nginx
                - !Sub sudo -u {{ VSCodeUser }} --login code-server --install-extension AmazonWebServices.aws-toolkit-vscode --force
                - !Sub sudo -u {{ VSCodeUser }} --login code-server --install-extension AmazonWebServices.amazon-q-vscode --force
                - !Sub sudo -u {{ VSCodeUser }} --login code-server --install-extension ms-vscode.live-server --force
                - !Sub sudo -u {{ VSCodeUser }} --login code-server --install-extension synedra.auto-run-command --force
                - !Sub chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /home/{{ VSCodeUser }}
                - echo "Nginx installed. Checking configuration"
                - nginx -t 2>&1
                - systemctl status nginx
                - echo "CodeServer installed. Checking configuration"
                - code-server -v
                - !Sub systemctl status code-server@{{ VSCodeUser }}
          - name: setupEC2DatabaseClient
            action: aws:runShellScript
            inputs:
              runCommand:
                - '#!/bin/bash'
                - !Sub |
                  echo "Installing Oracle Client SQLCL..."
                  su - {{ VSCodeUser }} <<EOD1S
                  wget -q https://download.oracle.com/otn_software/java/sqldeveloper/sqlcl-latest.zip
                  unzip -q sqlcl-latest.zip
                  echo 'export SQLCL_HOME=/home/{{ VSCodeUser }}/sqlcl' >> ~/.bash_profile
                  echo 'export PATH=\$SQLCL_HOME/bin:\$PATH' >> ~/.bash_profile
                  EOD1S
                  echo "Oracle Client SQLCL Installation Completed"
                  echo "Oracle SQLCL Version: $(/home/{{ VSCodeUser }}/sqlcl/bin/sql -version)"
                  echo "=========================================="
                  
                  echo "Installing Oracle Client SQLPlus..."
                  dnf install -y https://download.oracle.com/otn_software/linux/instantclient/1929000/oracle-instantclient19.29-basic-19.29.0.0.0-1.x86_64.rpm \
                  https://download.oracle.com/otn_software/linux/instantclient/1929000/oracle-instantclient19.29-sqlplus-19.29.0.0.0-1.x86_64.rpm \
                  https://download.oracle.com/otn_software/linux/instantclient/1929000/oracle-instantclient19.29-tools-19.29.0.0.0-1.x86_64.rpm
                  su - {{ VSCodeUser }} <<EOD2S
                  echo 'export ORACLE_HOME=/usr/lib/oracle/19.29/client64' >> ~/.bash_profile
                  echo 'export PATH=\$ORACLE_HOME/bin:\$PATH' >> ~/.bash_profile
                  EOD2S
                  echo "Oracle Client SQLPlus Installation Completed"
                  echo "Oracle SQLPlus Version: $(/usr/lib/oracle/19.29/client64/bin/sqlplus -V)"
                  echo "=========================================="
                  
                  echo "Installing SQL Server Client..."
                  curl https://packages.microsoft.com/config/rhel/9.0/prod.repo | tee /etc/yum.repos.d/mssql-release.repo
                  ACCEPT_EULA=Y dnf install -y mssql-tools18 unixODBC-devel
                  su - {{ VSCodeUser }} <<EOD3S
                  echo 'export PATH=/opt/mssql-tools18/bin:\$PATH' >> ~/.bash_profile
                  EOD3S
                  echo "SQL Server Client Installation Completed"
                  echo "SQL Server Client Version: $(/opt/mssql-tools18/bin/sqlcmd -? |head -n 3)"
                  echo "=========================================="
                  
                  echo "Installing PostgreSQL Client..."
                  dnf install -y postgresql17-contrib postgresql17
                  echo "PostgreSQL Client Installation Completed"
                  echo "PostgreSQL Client Version: $(psql -V)"
                  echo "=========================================="
          - name: InstallKiroCLI
            action: aws:runShellScript
            inputs:
              runCommand:
                - |
                  su - {{ VSCodeUser }} <<'EOFKIRO'
                  curl -fsSL https://cli.kiro.dev/install | bash
                  export PATH="$HOME/.local/bin:$PATH"
                  echo "Kiro CLI Installation Completed"
                  echo "Kiro CLI Version: $(kiro-cli -V)"
                  echo "=========================================="
                  EOFKIRO

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref EC2Instance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  
  PrivateIp:
    Description: Private IP address
    Value: !GetAtt EC2Instance.PrivateIp
    Export:
      Name: !Sub '${AWS::StackName}-PrivateIp'
  
  PublicIp:
    Description: Public IP address 
    Value: !GetAtt EC2Instance.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIp'
  
  PrivateDnsName:
    Description: Private DNS name
    Value: !GetAtt EC2Instance.PrivateDnsName
    Export:
      Name: !Sub '${AWS::StackName}-PrivateDnsName'
  
  PublicDnsName:
    Description: Public DNS name
    Value: !GetAtt EC2Instance.PublicDnsName
    Export:
      Name: !Sub '${AWS::StackName}-PublicDnsName'

  SetupEC2BaseDocumentName:
    Description: SSM document name for EC2 instance base setup
    Value: !Ref SetupEC2BaseDocument
    Export:
      Name: !Sub '${AWS::StackName}-SetupEC2BaseDocumentName'