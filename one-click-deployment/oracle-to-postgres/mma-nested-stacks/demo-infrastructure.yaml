Description: Demo infrastructure - Oracle RDS, Aurora PostgreSQL, and DMS for migration testing

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs
  
  EC2SecurityGroupId:
    Type: String

  StackPrefix:
    Type: String
  
  DemoSQLScriptsURL:
    Type: String
    Description: HTTPS URL to SQL scripts zip file (e.g., https://bucket.s3.region.amazonaws.com/scripts.zip)

  KmsKeyId:
    Type: String
    Description: KMS CMK ARN for Secrets Manager encryption

  KmsKeyArn:
    Type: String
    Description: KMS CMK ARN for IAM policy grants

Resources:
  ###############################################################################################
  ### Secrets
  ###############################################################################################
  
  DemoOracleAdminUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${StackPrefix}-demo-secret-oracle-admin'
      KmsKeyId: !Ref KmsKeyId
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin", "engine": "oracle", "port": 1521, "dbname": "ORCL"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '|\.+%"@/\\&<>;,[]{}()#?*=!''`:$~ '
        ExcludePunctuation: false
        RequireEachIncludedType: true
  
  DemoPostgresAdminUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${StackPrefix}-demo-secret-postgres-admin'
      KmsKeyId: !Ref KmsKeyId
      GenerateSecretString:
        SecretStringTemplate: '{"username": "postgres", "engine": "postgres", "port": 5432, "dbname": "demodb"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '|\.+%"@/\\&<>;,[]{}()#?*=!''`:$~ '
        ExcludePunctuation: false
        RequireEachIncludedType: true

  DemoOracleTestUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${StackPrefix}-demo-oracle-ro-user'
      KmsKeyId: !Ref KmsKeyId
      GenerateSecretString:
        SecretStringTemplate: '{"username": "oracle_ro_user", "port": 1521, "dbname": "ORCL"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '|\.+%"@/\\&<>;,[]{}()#?*=!''`:$~ '
        ExcludePunctuation: false
        RequireEachIncludedType: true
  
  DemoPostgresTestUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${StackPrefix}-demo-postgres-ro-user'
      KmsKeyId: !Ref KmsKeyId
      GenerateSecretString:
        SecretStringTemplate: '{"username": "postgres_ro_user", "port": 5432, "dbname": "demodb"}'
        GenerateStringKey: 'password'
        PasswordLength: 16
        ExcludeCharacters: '|\.+%"@/\\&<>;,[]{}()#?*=!''`:$~ '
        ExcludePunctuation: false
        RequireEachIncludedType: true

  # Secrets will be updated with host information by SSM documents
  
  ###############################################################################################
  ### Security Groups
  ###############################################################################################
  
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Oracle RDS security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - Description: Oracle from EC2SecurityGroup
          IpProtocol: tcp
          FromPort: 1521
          ToPort: 1521
          SourceSecurityGroupId: !Ref EC2SecurityGroupId
        - Description: PostgreSQL from EC2SecurityGroup
          IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroupId          
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-db-sg'

  OracleSecurityGroupIngressSelf:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 1521
      ToPort: 1521
      SourceSecurityGroupId: !Ref DBSecurityGroup
      Description: Allow Oracle traffic from itself
  
  PostgresSecurityGroupIngressSelf:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref DBSecurityGroup
      Description: Allow Oracle traffic from itself
  
  # Egress rules for database ports
  DBSecurityGroupEgressOracle:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref DBSecurityGroup
      DestinationSecurityGroupId: !GetAtt DBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 1521
      ToPort: 1521
      Description: Allow outbound Oracle traffic to same security group

  DBSecurityGroupEgressPostgres:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref DBSecurityGroup
      DestinationSecurityGroupId: !GetAtt DBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      Description: Allow outbound PostgreSQL traffic to same security group

  ###############################################################################################
  ### Oracle RDS (Source)
  ###############################################################################################
  
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${StackPrefix}-demo-db-subnet-group'
      DBSubnetGroupDescription: Oracle/AuroraPG subnet group
      SubnetIds: !Ref SubnetIds
  
  DBMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      # RoleName: !Sub ${StackPrefix}-demo-rdsmonitoring
      Description: Provides access to Cloudwatch for RDS Enhanced Monitoring
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonRDSEnhancedMonitoringRole
      AssumeRolePolicyDocument:
        Version: '2008-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: monitoring.rds.amazonaws.com
            Action: sts:AssumeRole

  OracleDB:
    #checkov:skip=CKV_AWS_157:Multi-AZ not required for demo environment
    #checkov:skip=CKV_AWS_118:Enhanced monitoring not required for demo environment
    Type: AWS::RDS::DBInstance
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name required for demo environment identification and cross-stack references"
    Properties:
      DBInstanceIdentifier: !Sub '${StackPrefix}-demo-oracle-source'
      Engine: oracle-ee
      EngineVersion: '19.0.0.0.ru-2024-10.rur-2024-10.r1'
      LicenseModel: bring-your-own-license
      DBInstanceClass: db.r6i.xlarge
      DBName: ORCL
      AllocatedStorage: 50
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Sub '{{resolve:secretsmanager:${DemoOracleAdminUserSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DemoOracleAdminUserSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: 1
      MonitoringInterval: 60
      MonitoringRoleArn: !GetAtt DBMonitorRole.Arn
      EnableCloudwatchLogsExports:
        - alert
        - trace
      DeletionProtection: true
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 465
      DatabaseInsightsMode: advanced
      AutoMinorVersionUpgrade: false
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-oracle-source'
  
  ###############################################################################################
  ### Aurora PostgreSQL (Target)
  ###############################################################################################
    
  AuroraCluster:
    #checkov:skip=CKV_AWS_162:IAM authentication not required for demo environment
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: !Sub '${StackPrefix}-demo-aurora-pg-cluster'
      Engine: aurora-postgresql
      EngineVersion: '17.7'
      DatabaseName: demodb
      MasterUsername: !Sub '{{resolve:secretsmanager:${DemoPostgresAdminUserSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${DemoPostgresAdminUserSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      ServerlessV2ScalingConfiguration:
        MaxCapacity: 16
        MinCapacity: 1
      Port: 5432
      PerformanceInsightsEnabled: true
      PerformanceInsightsRetentionPeriod: 465
      DatabaseInsightsMode: advanced
      EnableCloudwatchLogsExports:
        - postgresql
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      DeletionProtection: true      
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-aurora-cluster'
  
  AuroraInstance:
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Explicit name required for demo environment identification"
    #checkov:skip=CKV_AWS_118:Enhanced monitoring not required for demo environment
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${StackPrefix}-demo-aurora-instance'
      Engine: aurora-postgresql
      DBInstanceClass: db.serverless
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: false
  
  ###############################################################################################
  ### DMS Resources
  ###############################################################################################
  
  # S3 Bucket for DMS Schema Conversion
  DmsS3Bucket:
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: "Access logging not required for demo environment"
    #checkov:skip=CKV_AWS_18:Access logging not required for demo environment
    #checkov:skip=CKV_AWS_145:SSE-S3 required - DMS Schema Conversion does not support SSE-KMS (https://docs.aws.amazon.com/dms/latest/userguide/schema-conversion-s3.html)
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub '${StackPrefix}-dms-sc-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  DmsS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DmsS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DmsS3Bucket.Arn
              - !Sub '${DmsS3Bucket.Arn}/*'
            Condition:
              Bool:
                'aws:SecureTransport': 'false'
  
  # IAM Roles for DMS
  DmsScS3AccessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Allow DMS SC to access S3 bucket
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - dms.amazonaws.com
                - !Sub 'dms.${AWS::Region}.amazonaws.com'
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:${AWS::Partition}:s3:::${StackPrefix}-dms-sc-${AWS::AccountId}'
                  - !Sub 'arn:${AWS::Partition}:s3:::${StackPrefix}-dms-sc-${AWS::AccountId}/*'
  
  DmsScSecretsManagerRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Allow DMS SC to access database secrets
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - dms.amazonaws.com
                - !Sub 'dms.${AWS::Region}.amazonaws.com'
                - schema-conversion.dms.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Policies:
        - PolicyName: SecretsManagerCMKAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:ReEncrypt*
                  - kms:CreateGrant
                  - kms:DescribeKey
                  - kms:GenerateDataKey*
                Resource: !Ref KmsKeyArn
  
  DMSSubnetGroup:
    Type: AWS::DMS::ReplicationSubnetGroup
    Properties:
      ReplicationSubnetGroupIdentifier: !Sub '${StackPrefix}-demo-dms-subnet-group'
      ReplicationSubnetGroupDescription: DMS subnet group
      SubnetIds: !Ref SubnetIds
  
  # DMS Schema Conversion Resources
  SourceDataProvider:
    Type: AWS::DMS::DataProvider
    Properties:
      DataProviderIdentifier: !Sub '${StackPrefix}-demo-dms-sc-source'
      DataProviderName: !Sub '${StackPrefix}-demo-dms-sc-source'
      Engine: oracle
      Settings:
        OracleSettings:
          DatabaseName: ORCL
          Port: !GetAtt OracleDB.Endpoint.Port
          ServerName: !GetAtt OracleDB.Endpoint.Address
          SslMode: none
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-dms-sc-source'
  
  DestinationDataProvider:
    Type: AWS::DMS::DataProvider
    Properties:
      DataProviderIdentifier: !Sub '${StackPrefix}-demo-dms-sc-target'
      DataProviderName: !Sub '${StackPrefix}-demo-dms-sc-target'
      Engine: aurora_postgresql
      Settings:
        PostgreSqlSettings:
          DatabaseName: demodb
          Port: !GetAtt AuroraCluster.Endpoint.Port
          ServerName: !GetAtt AuroraCluster.Endpoint.Address
          SslMode: require
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-dms-sc-target'
  
  InstanceProfileIdentifier:
    Type: AWS::DMS::InstanceProfile
    Properties:
      Description: DMS SC instance profile
      NetworkType: IPV4
      InstanceProfileIdentifier: !Sub '${StackPrefix}-dms-sc-profile'
      InstanceProfileName: !Sub '${StackPrefix}-dms-sc-profile'
      SubnetGroupIdentifier: !Ref DMSSubnetGroup
      PubliclyAccessible: false
      VpcSecurityGroups:
        - !Ref DBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-dms-sc-profile'
  
  DmsScMigrationProject:
    Type: AWS::DMS::MigrationProject
    DependsOn: [DmsScS3AccessRole, DmsScSecretsManagerRole]
    Properties:
      Description: DMS SC Migration Project
      InstanceProfileIdentifier: !Ref InstanceProfileIdentifier
      MigrationProjectName: !Sub '${StackPrefix}-demo-dms-sc-migration-project'
      SchemaConversionApplicationAttributes:
        S3BucketPath: !Ref DmsS3Bucket
        S3BucketRoleArn: !GetAtt DmsScS3AccessRole.Arn
      SourceDataProviderDescriptors:
        - DataProviderArn: !GetAtt SourceDataProvider.DataProviderArn
          SecretsManagerSecretId: !Ref DemoOracleAdminUserSecret
          SecretsManagerAccessRoleArn: !GetAtt DmsScSecretsManagerRole.Arn
          DataProviderIdentifier: !Ref SourceDataProvider
      TargetDataProviderDescriptors:
        - DataProviderArn: !GetAtt DestinationDataProvider.DataProviderArn
          SecretsManagerSecretId: !Ref DemoPostgresAdminUserSecret
          SecretsManagerAccessRoleArn: !GetAtt DmsScSecretsManagerRole.Arn
          DataProviderIdentifier: !Ref DestinationDataProvider
      TransformationRules: |
        {"rules": [
          {"rule-type": "transformation", "rule-id": "10", "rule-name": "lowercase1", "rule-action": "convert-lowercase", "rule-target": "table", "object-locator": {"table-name": "%"}}
        ]}
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-dms-sc-migration-project'
  
  # DMS Replication Instance
  DMSReplicationInstance:
    Type: AWS::DMS::ReplicationInstance
    Properties:
      ReplicationInstanceIdentifier: !Sub '${StackPrefix}-demo-dms-instance'
      ReplicationInstanceClass: dms.t3.medium
      AllocatedStorage: 50
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      ReplicationSubnetGroupIdentifier: !Ref DMSSubnetGroup
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-dms-instance'
  
  DMSSourceEndpoint:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: !Sub '${StackPrefix}-demo-oracle-source-endpoint'
      EndpointType: source
      EngineName: oracle
      ServerName: !GetAtt OracleDB.Endpoint.Address
      Port: 1521
      DatabaseName: ORCL
      Username: admin
      Password: !Sub '{{resolve:secretsmanager:${DemoOracleAdminUserSecret}:SecretString:password}}'
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-oracle-source-endpoint'
  
  DMSTargetEndpoint:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: !Sub '${StackPrefix}-demo-postgres-target-endpoint'
      EndpointType: target
      EngineName: aurora-postgresql
      ServerName: !GetAtt AuroraCluster.Endpoint.Address
      Port: 5432
      DatabaseName: demodb
      Username: postgres
      Password: !Sub '{{resolve:secretsmanager:${DemoPostgresAdminUserSecret}:SecretString:password}}'
      SslMode: require
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-demo-postgres-target-endpoint'

  
  ###############################################################################################
  ### SSM Documents for Database Setup
  ###############################################################################################
  
  SetupEnvironmentDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-demo-setup-environment'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Setup environment for Oracle schema deployment
        parameters:
          SQLScriptsURL:
            type: String
          VSCodeUser:
            type: String
            default: 'awsmma'
        mainSteps:
          - action: aws:runShellScript
            name: setupEnvironment
            inputs:
              runCommand:
                - |
                  #!/bin/bash
                  set -e

                  echo "Setting up working directory..."
                  mkdir -p /home/{{ VSCodeUser }}/mma-demo
                  cd /home/{{ VSCodeUser }}/mma-demo

                  echo "Downloading SQL scripts..."
                  wget -q -O oracle-scripts.zip "{{ SQLScriptsURL }}"
                  unzip -o oracle-scripts.zip

                  chown -R {{ VSCodeUser }}:{{ VSCodeUser }} /home/{{ VSCodeUser }}/mma-demo
                  echo "Setup complete!"
                                 
  
  DeployOracleSchemaDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-deploy-oracle-schema'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Deploy Oracle DEMO schema and create test users
        parameters:
          VSCodeUser:
            type: String
            default: 'awsmma'        
        mainSteps:
          - action: aws:runShellScript
            name: deploySchemaScripts1
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  ORACLE_HOST="${OracleDB.Endpoint.Address}"
                  ORACLE_PASS=$(aws secretsmanager get-secret-value --secret-id ${DemoOracleAdminUserSecret} --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  
                  echo "Deploying Oracle schema..."
                  su - {{ VSCodeUser }} <<EOF
                  cd /home/{{ VSCodeUser }}/mma-demo
                  # Password for demo user changed to same as Admin User
                  sed -i "s/Welcome123_/$ORACLE_PASS/g" 01_user.sql
                  sql -S admin/$ORACLE_PASS@//$ORACLE_HOST:1521/ORCL @01_user.sql
                  EOF
          - action: aws:runShellScript
            name: deploySchemaScripts2
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  ORACLE_HOST="${OracleDB.Endpoint.Address}"
                  ORACLE_PASS=$(aws secretsmanager get-secret-value --secret-id ${DemoOracleAdminUserSecret} --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  
                  echo "Deploying Oracle schema..."
                  su - {{ VSCodeUser }} <<EOF
                  cd /home/{{ VSCodeUser }}/mma-demo
                  sql -S admin/$ORACLE_PASS@//$ORACLE_HOST:1521/ORCL @02_schema_oracle_v2.sql
                  EOF
          - action: aws:runShellScript
            name: deploySchemaScripts3
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  ORACLE_HOST="${OracleDB.Endpoint.Address}"
                  ORACLE_PASS=$(aws secretsmanager get-secret-value --secret-id ${DemoOracleAdminUserSecret} --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  
                  echo "Deploying Oracle schema..."
                  su - {{ VSCodeUser }} <<EOF
                  cd /home/{{ VSCodeUser }}/mma-demo
                  sql -S admin/$ORACLE_PASS@//$ORACLE_HOST:1521/ORCL @03_data_oracle_jpa_v2.sql
                  EOF
          - action: aws:runShellScript
            name: deploySchemaScripts4
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  ORACLE_HOST="${OracleDB.Endpoint.Address}"
                  ORACLE_PASS=$(aws secretsmanager get-secret-value --secret-id ${DemoOracleAdminUserSecret} --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  
                  echo "Deploying Oracle schema..."
                  su - {{ VSCodeUser }} <<EOF
                  cd /home/{{ VSCodeUser }}/mma-demo
                  sql -S admin/$ORACLE_PASS@//$ORACLE_HOST:1521/ORCL @04_complex_schema_v2.sql
                  EOF
          - action: aws:runShellScript
            name: createTestUser  
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  ORACLE_HOST="${OracleDB.Endpoint.Address}"
                  ORACLE_PASS=$(aws secretsmanager get-secret-value --secret-id ${DemoOracleAdminUserSecret} --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  TEST_USER_SECRET="${DemoOracleTestUserSecret}"
                  TEST_USER_PASS=$(aws secretsmanager get-secret-value --secret-id $TEST_USER_SECRET --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  
                  echo "Creating Oracle test user..."
                  su - {{ VSCodeUser }} <<EOF
                  sql admin/$ORACLE_PASS@//$ORACLE_HOST:1521/ORCL <<EOSQL
                  WHENEVER SQLERROR CONTINUE
                  DECLARE
                      user_exists NUMBER;
                  BEGIN
                      SELECT COUNT(*) INTO user_exists FROM dba_users WHERE username = 'ORACLE_RO_USER';
                      IF user_exists = 0 THEN
                          EXECUTE IMMEDIATE 'CREATE USER oracle_ro_user IDENTIFIED BY "$TEST_USER_PASS"';
                      END IF;
                  END;
                  /
                  GRANT CREATE SESSION TO oracle_ro_user;
                  GRANT SELECT ANY TABLE TO oracle_ro_user;
                  GRANT EXECUTE ANY PROCEDURE TO oracle_ro_user;
                  EXIT;
                  EOSQL
                  
                  echo "Verifying Oracle deployment..."
                  sql -S admin/$ORACLE_PASS@//$ORACLE_HOST:1521/ORCL <<< "SELECT COUNT(*) AS tables FROM all_tables WHERE owner='DEMO'; EXIT;"
                  EOF

          - action: aws:runShellScript
            name: updateSecrets
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  ORACLE_HOST="${OracleDB.Endpoint.Address}"
                  REGION=${AWS::Region}
                  
                  # Update admin secret with host
                  ADMIN_SECRET="${DemoOracleAdminUserSecret}"
                  ADMIN_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $ADMIN_SECRET --region $REGION --query SecretString --output text)
                  UPDATED_ADMIN=$(echo $ADMIN_SECRET_JSON | jq --arg host "$ORACLE_HOST" '. + {host: $host, engine: "oracle"}')
                  aws secretsmanager put-secret-value --secret-id $ADMIN_SECRET --region $REGION --secret-string "$UPDATED_ADMIN"
                  
                  # Update test user secret with host
                  TEST_USER_SECRET="${DemoOracleTestUserSecret}"
                  TEST_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $TEST_USER_SECRET --region $REGION --query SecretString --output text)
                  UPDATED_TEST=$(echo $TEST_SECRET_JSON | jq --arg host "$ORACLE_HOST" '. + {host: $host, engine: "oracle"}')
                  aws secretsmanager put-secret-value --secret-id $TEST_USER_SECRET --region $REGION --secret-string "$UPDATED_TEST"
                  
                  echo "Secrets updated with host information"
  
  DeployPostgresSchemaDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-deploy-postgres-schema'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Create PostgreSQL test user and setup permissions
        mainSteps:
          - action: aws:runShellScript
            name: setupPostgresUser
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  PG_HOST="${AuroraCluster.Endpoint.Address}"
                  PG_PASS=$(aws secretsmanager get-secret-value --secret-id ${DemoPostgresAdminUserSecret} --region ${AWS::Region} --query SecretString --output text | jq -r .password)
                  
                  # Get test user password from Secrets Manager
                  REGION=${AWS::Region}
                  TEST_USER_SECRET="${DemoPostgresTestUserSecret}"
                  TEST_USER_PASS=$(aws secretsmanager get-secret-value --secret-id $TEST_USER_SECRET --region $REGION --query SecretString --output text | jq -r .password)
                  
                  echo "Creating PostgreSQL test user..."
                  PGPASSWORD=$PG_PASS psql -h $PG_HOST -p 5432 -U postgres -d demodb <<EOF
                  DO \$\$
                  BEGIN
                      IF NOT EXISTS (SELECT FROM pg_user WHERE usename = 'postgres_ro_user') THEN
                          CREATE USER postgres_ro_user WITH PASSWORD '$TEST_USER_PASS';
                      END IF;
                  END
                  \$\$;
                  GRANT CONNECT ON DATABASE demodb TO postgres_ro_user;
                  CREATE SCHEMA IF NOT EXISTS demo;
                  GRANT USAGE ON SCHEMA demo TO postgres_ro_user;
                  GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA demo TO postgres_ro_user;
                  GRANT EXECUTE ON ALL PROCEDURES IN SCHEMA demo TO postgres_ro_user;
                  GRANT SELECT ON ALL TABLES IN SCHEMA demo TO postgres_ro_user;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA demo GRANT SELECT ON TABLES TO postgres_ro_user;
                  ALTER DEFAULT PRIVILEGES IN SCHEMA demo GRANT EXECUTE ON ROUTINES TO postgres_ro_user;
                  GRANT pg_read_all_data TO postgres_ro_user;
                  ALTER USER postgres_ro_user SET default_transaction_read_only = on;
                  EOF
                  
                  echo "PostgreSQL test user created successfully"
          - action: aws:runShellScript
            name: updateSecrets
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                
                  PG_HOST="${AuroraCluster.Endpoint.Address}"
                  REGION=${AWS::Region}

                  # Update admin secret with host
                  ADMIN_SECRET="${DemoPostgresAdminUserSecret}"
                  ADMIN_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $ADMIN_SECRET --region $REGION --query SecretString --output text)
                  UPDATED_ADMIN=$(echo $ADMIN_SECRET_JSON | jq --arg host "$PG_HOST" '. + {host: $host, engine: "postgres"}')
                  aws secretsmanager put-secret-value --secret-id $ADMIN_SECRET --region $REGION --secret-string "$UPDATED_ADMIN"
                  
                  # Update test user secret with host
                  TEST_USER_SECRET="${DemoPostgresTestUserSecret}"
                  TEST_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $TEST_USER_SECRET --region $REGION --query SecretString --output text)
                  UPDATED_TEST=$(echo $TEST_SECRET_JSON | jq --arg host "$PG_HOST" '. + {host: $host, engine: "postgres"}')
                  aws secretsmanager put-secret-value --secret-id $TEST_USER_SECRET --region $REGION --secret-string "$UPDATED_TEST"
                  
                  echo "Secrets updated with host information"
  

  ###############################################################################################
  ### SSM Documents for DMS Schema Conversion and Migration
  ###############################################################################################
  
  DMSSchemaConversionDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-dms-schema-conversion'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Run DMS Schema Conversion (Assessment, Conversion, Export)
        parameters:
          MigrationProjectName:
            type: String
            default: !Sub '${StackPrefix}-demo-dms-sc-migration-project'
          SourceSchema:
            type: String
            default: 'DEMO'
          TargetSchema:
            type: String
            default: 'demo'
        mainSteps:
          - action: aws:runShellScript
            name: runSchemaConversion
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  PROJECT="{{ MigrationProjectName }}"
                  REGION="${AWS::Region}"
                  SOURCE_SCHEMA="{{ SourceSchema }}"
                  TARGET_SCHEMA="{{ TargetSchema }}"
                  
                  export AWS_PAGER=""
                  
                  log() {
                    echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"
                  }
                  
                  # Get source and target server names
                  SOURCE_SERVER=$(aws dms describe-migration-projects \
                    --region $REGION \
                    --filters Name=migration-project-identifier,Values=$PROJECT \
                    --query 'MigrationProjects[0].SourceDataProviderDescriptors[0].DataProviderArn' \
                    --output text | xargs -I {} aws dms describe-data-providers \
                    --region $REGION \
                    --filters Name=data-provider-identifier,Values={} \
                    --query 'DataProviders[0].Settings.OracleSettings.ServerName' \
                    --output text)
                  
                  TARGET_SERVER=$(aws dms describe-migration-projects \
                    --region $REGION \
                    --filters Name=migration-project-identifier,Values=$PROJECT \
                    --query 'MigrationProjects[0].TargetDataProviderDescriptors[0].DataProviderArn' \
                    --output text | xargs -I {} aws dms describe-data-providers \
                    --region $REGION \
                    --filters Name=data-provider-identifier,Values={} \
                    --query 'DataProviders[0].Settings.PostgreSqlSettings.ServerName' \
                    --output text)
                  
                  log "Source Server: $SOURCE_SERVER"
                  log "Target Server: $TARGET_SERVER"
                  
                  # 1. Assessment
                  log "Starting assessment..."
                  ASSESSMENT_ID=$(aws dms start-metadata-model-assessment \
                    --region $REGION \
                    --migration-project-identifier $PROJECT \
                    --selection-rules "{\"rules\": [
                      {\"rule-type\": \"selection\", \"rule-id\": \"1\", \"rule-name\": \"include-schema\", \"object-locator\": {\"server-name\": \"$SOURCE_SERVER\", \"schema-name\": \"$SOURCE_SCHEMA\"}, \"rule-action\": \"include\"},
                      {\"rule-type\": \"selection\", \"rule-id\": \"2\", \"rule-name\": \"exclude-dr-tables\", \"object-locator\": {\"server-name\": \"$SOURCE_SERVER\", \"schema-name\": \"$SOURCE_SCHEMA\", \"table-name\": \"DR$%\"}, \"rule-action\": \"exclude\"}
                    ]}" \
                    --query 'RequestIdentifier' --output text)
                  
                  log "Waiting for assessment to complete..."
                  while true; do
                    STATUS=$(aws dms describe-metadata-model-assessments --region $REGION --migration-project-identifier $PROJECT --query "Requests[?RequestIdentifier=='$ASSESSMENT_ID'].Status" --output text)
                    log "Assessment status: $STATUS"
                    [[ "$STATUS" == "SUCCESS" ]] && break
                    [[ "$STATUS" == "FAILED" ]] && exit 1
                    sleep 5
                  done
                  
                  # 2. Conversion
                  log "Starting conversion..."
                  CONVERSION_ID=$(aws dms start-metadata-model-conversion \
                    --region $REGION \
                    --migration-project-identifier $PROJECT \
                    --selection-rules "{\"rules\": [
                      {\"rule-type\": \"selection\", \"rule-id\": \"1\", \"rule-name\": \"include-schema\", \"object-locator\": {\"server-name\": \"$SOURCE_SERVER\", \"schema-name\": \"$SOURCE_SCHEMA\"}, \"rule-action\": \"include\"},
                      {\"rule-type\": \"selection\", \"rule-id\": \"2\", \"rule-name\": \"exclude-dr-tables\", \"object-locator\": {\"server-name\": \"$SOURCE_SERVER\", \"schema-name\": \"$SOURCE_SCHEMA\", \"table-name\": \"DR$%\"}, \"rule-action\": \"exclude\"}
                    ]}" \
                    --query 'RequestIdentifier' --output text)
                  
                  log "Waiting for conversion to complete..."
                  while true; do
                    STATUS=$(aws dms describe-metadata-model-conversions --region $REGION --migration-project-identifier $PROJECT --query "Requests[?RequestIdentifier=='$CONVERSION_ID'].Status" --output text)
                    log "Conversion status: $STATUS"
                    [[ "$STATUS" == "SUCCESS" ]] && break
                    [[ "$STATUS" == "FAILED" ]] && exit 1
                    sleep 5
                  done
                  
                  # 3. Export to target
                  log "Starting export to target..."
                  EXPORT_ID=$(aws dms start-metadata-model-export-to-target \
                    --region $REGION \
                    --migration-project-identifier $PROJECT \
                    --selection-rules "{\"rules\": [
                      {\"rule-type\": \"selection\", \"rule-id\": \"1\", \"rule-name\": \"include-schema\", \"object-locator\": {\"server-name\": \"$TARGET_SERVER\", \"schema-name\": \"$TARGET_SCHEMA\"}, \"rule-action\": \"include\"}
                    ]}" \
                    --query 'RequestIdentifier' --output text)
                  
                  log "Waiting for export to complete..."
                  while true; do
                    STATUS=$(aws dms describe-metadata-model-exports-to-target --region $REGION --migration-project-identifier $PROJECT --query "Requests[?RequestIdentifier=='$EXPORT_ID'].Status" --output text)
                    log "Export status: $STATUS"
                    [[ "$STATUS" == "SUCCESS" ]] && break
                    [[ "$STATUS" == "FAILED" ]] && exit 1
                    sleep 5
                  done
                  
                  log "Schema conversion completed successfully"
  
  DMSDataMigrationDocument:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub '${StackPrefix}-dms-data-migration'
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: Run DMS Data Migration
        parameters:
          ReplicationInstanceId:
            type: String
            default: !Sub '${StackPrefix}-demo-dms-instance'
          SourceEndpointId:
            type: String
            default: !Sub '${StackPrefix}-demo-oracle-source-endpoint'
          TargetEndpointId:
            type: String
            default: !Sub '${StackPrefix}-demo-postgres-target-endpoint'
          TaskId:
            type: String
            default: !Sub '${StackPrefix}-demo-data-migration-task'
          SourceSchema:
            type: String
            default: 'DEMO'
        mainSteps:
          - action: aws:runShellScript
            name: runDataMigration
            inputs:
              runCommand:
                - !Sub |
                  #!/bin/bash
                  set -e
                  
                  REGION="${AWS::Region}"
                  REPLICATION_INSTANCE="{{ ReplicationInstanceId }}"
                  SOURCE_ENDPOINT="{{ SourceEndpointId }}"
                  TARGET_ENDPOINT="{{ TargetEndpointId }}"
                  TASK_ID="{{ TaskId }}"
                  SOURCE_SCHEMA="{{ SourceSchema }}"
                  
                  export AWS_PAGER=""
                  
                  log() {
                    echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"
                  }
                  
                  # Test source endpoint connection
                  log "Testing source endpoint connection..."
                  aws dms test-connection \
                    --region $REGION \
                    --replication-instance-arn $(aws dms describe-replication-instances --region $REGION --filters Name=replication-instance-id,Values=$REPLICATION_INSTANCE --query 'ReplicationInstances[0].ReplicationInstanceArn' --output text) \
                    --endpoint-arn $(aws dms describe-endpoints --region $REGION --filters Name=endpoint-id,Values=$SOURCE_ENDPOINT --query 'Endpoints[0].EndpointArn' --output text)
                  
                  # Test target endpoint connection
                  log "Testing target endpoint connection..."
                  aws dms test-connection \
                    --region $REGION \
                    --replication-instance-arn $(aws dms describe-replication-instances --region $REGION --filters Name=replication-instance-id,Values=$REPLICATION_INSTANCE --query 'ReplicationInstances[0].ReplicationInstanceArn' --output text) \
                    --endpoint-arn $(aws dms describe-endpoints --region $REGION --filters Name=endpoint-id,Values=$TARGET_ENDPOINT --query 'Endpoints[0].EndpointArn' --output text)
                  
                  # Wait for connections to complete
                  log "Waiting for connection tests to complete..."
                  SOURCE_ARN=$(aws dms describe-endpoints --region $REGION --filters Name=endpoint-id,Values=$SOURCE_ENDPOINT --query 'Endpoints[0].EndpointArn' --output text)
                  TARGET_ARN=$(aws dms describe-endpoints --region $REGION --filters Name=endpoint-id,Values=$TARGET_ENDPOINT --query 'Endpoints[0].EndpointArn' --output text)
                  
                  while true; do
                    SOURCE_STATUS=$(aws dms describe-connections --region $REGION --filters Name=endpoint-arn,Values=$SOURCE_ARN --query 'Connections[0].Status' --output text)
                    TARGET_STATUS=$(aws dms describe-connections --region $REGION --filters Name=endpoint-arn,Values=$TARGET_ARN --query 'Connections[0].Status' --output text)
                    
                    log "Source endpoint status: $SOURCE_STATUS, Target endpoint status: $TARGET_STATUS"
                    
                    if [[ "$SOURCE_STATUS" == "successful" ]] && [[ "$TARGET_STATUS" == "successful" ]]; then
                      log "Both connections successful"
                      break
                    elif [[ "$SOURCE_STATUS" == "failed" ]] || [[ "$TARGET_STATUS" == "failed" ]]; then
                      log "Connection test failed. Exiting."
                      exit 1
                    fi
                    
                    sleep 5
                  done
                  
                  # Create replication task
                  log "Creating replication task..."
                  aws dms create-replication-task \
                    --region $REGION \
                    --replication-task-identifier $TASK_ID \
                    --tags "Key=Name,Value=$TASK_ID" \
                    --source-endpoint-arn $(aws dms describe-endpoints --region $REGION --filters Name=endpoint-id,Values=$SOURCE_ENDPOINT --query 'Endpoints[0].EndpointArn' --output text) \
                    --target-endpoint-arn $(aws dms describe-endpoints --region $REGION --filters Name=endpoint-id,Values=$TARGET_ENDPOINT --query 'Endpoints[0].EndpointArn' --output text) \
                    --replication-instance-arn $(aws dms describe-replication-instances --region $REGION --filters Name=replication-instance-id,Values=$REPLICATION_INSTANCE --query 'ReplicationInstances[0].ReplicationInstanceArn' --output text) \
                    --migration-type full-load \
                    --table-mappings "{
                      \"rules\": [
                        {
                          \"rule-type\": \"selection\",
                          \"rule-id\": \"1\",
                          \"rule-name\": \"include-demo-schema\",
                          \"object-locator\": {
                            \"schema-name\": \"$SOURCE_SCHEMA\",
                            \"table-name\": \"%\"
                          },
                          \"rule-action\": \"include\"
                        },
                        {
                          \"rule-type\": \"selection\",
                          \"rule-id\": \"2\",
                          \"rule-name\": \"exclude-dr-tables\",
                          \"object-locator\": {
                            \"schema-name\": \"$SOURCE_SCHEMA\",
                            \"table-name\": \"DR$%\"
                          },
                          \"rule-action\": \"exclude\"
                        },
                        {
                          \"rule-type\": \"transformation\",
                          \"rule-id\": \"3\",
                          \"rule-name\": \"schema-lowercase\",
                          \"rule-target\": \"schema\",
                          \"object-locator\": {
                            \"schema-name\": \"%\"
                          },
                          \"rule-action\": \"convert-lowercase\"
                        },
                        {
                          \"rule-type\": \"transformation\",
                          \"rule-id\": \"4\",
                          \"rule-name\": \"table-lowercase\",
                          \"rule-target\": \"table\",
                          \"object-locator\": {
                            \"schema-name\": \"%\",
                            \"table-name\": \"%\"
                          },
                          \"rule-action\": \"convert-lowercase\"
                        },
                        {
                          \"rule-type\": \"transformation\",
                          \"rule-id\": \"5\",
                          \"rule-name\": \"column-lowercase\",
                          \"rule-target\": \"column\",
                          \"object-locator\": {
                            \"schema-name\": \"%\",
                            \"table-name\": \"%\",
                            \"column-name\": \"%\"
                          },
                          \"rule-action\": \"convert-lowercase\"
                        }
                      ]
                    }" \
                    --replication-task-settings "{
                      \"TargetMetadata\": {
                        \"TargetSchema\": \"\",
                        \"SupportLobs\": true,
                        \"FullLobMode\": false,
                        \"LobChunkSize\": 32,
                        \"LimitedSizeLobMode\": true,
                        \"LobMaxSize\": 256
                      },
                      \"Logging\": {
                        \"EnableLogging\": true,
                        \"LogComponents\": [
                          {\"Id\": \"TRANSFORMATION\", \"Severity\": \"LOGGER_SEVERITY_DEFAULT\"},
                          {\"Id\": \"SOURCE_UNLOAD\", \"Severity\": \"LOGGER_SEVERITY_DEFAULT\"},
                          {\"Id\": \"TARGET_LOAD\", \"Severity\": \"LOGGER_SEVERITY_DEFAULT\"},
                          {\"Id\": \"SOURCE_CAPTURE\", \"Severity\": \"LOGGER_SEVERITY_DEFAULT\"},
                          {\"Id\": \"TARGET_APPLY\", \"Severity\": \"LOGGER_SEVERITY_DEFAULT\"},
                          {\"Id\": \"TASK_MANAGER\", \"Severity\": \"LOGGER_SEVERITY_DEFAULT\"}
                        ]
                      },
                      \"ControlTablesSettings\": {
                        \"ControlSchema\": \"\",
                        \"HistoryTimeslotInMinutes\": 5,
                        \"HistoryTableEnabled\": false,
                        \"SuspendedTablesTableEnabled\": false,
                        \"StatusTableEnabled\": false
                      },
                      \"FullLoadSettings\": {
                        \"TargetTablePrepMode\": \"DO_NOTHING\",
                        \"CreatePkAfterFullLoad\": false,
                        \"StopTaskCachedChangesApplied\": false,
                        \"StopTaskCachedChangesNotApplied\": false,
                        \"MaxFullLoadSubTasks\": 8,
                        \"TransactionConsistencyTimeout\": 600,
                        \"CommitRate\": 10000
                      },
                      \"ValidationSettings\": {
                        \"EnableValidation\": true,
                        \"ValidationMode\": \"ROW_LEVEL\"
                      }
                    }" || log "Task may already exist, continuing..."
                  
                  # Wait for task to be ready and start it
                  log "Waiting for task to start..."
                  while true; do
                    STATUS=$(aws dms describe-replication-tasks --region $REGION --filters Name=replication-task-id,Values=$TASK_ID --query 'ReplicationTasks[0].Status' --output text)
                    log "Task status: $STATUS"
                    
                    if [[ "$STATUS" == "ready" ]]; then
                      log "Task is ready, starting task..."
                      aws dms start-replication-task \
                        --region $REGION \
                        --replication-task-arn $(aws dms describe-replication-tasks --region $REGION --filters Name=replication-task-id,Values=$TASK_ID --query 'ReplicationTasks[0].ReplicationTaskArn' --output text) \
                        --start-replication-task-type start-replication
                      sleep 5
                    elif [[ "$STATUS" == "running" ]] || [[ "$STATUS" == "stopped" ]]; then
                      break
                    elif [[ "$STATUS" == "failed" ]]; then
                      log "Task failed. Exiting."
                      exit 1
                    fi
                    sleep 10
                  done
                  
                  # Monitor task progress
                  log "Monitoring task progress..."
                  while true; do
                    TASK_INFO=$(aws dms describe-replication-tasks --region $REGION --filters Name=replication-task-id,Values=$TASK_ID --query 'ReplicationTasks[0].[Status,ReplicationTaskStats.FullLoadProgressPercent,ReplicationTaskStats.TablesLoaded,ReplicationTaskStats.TablesLoading]' --output text)
                    log "Status: $TASK_INFO"
                    
                    STATUS=$(echo $TASK_INFO | awk '{print $1}')
                    if [[ "$STATUS" == "stopped" ]]; then
                      log "Task completed successfully"
                      break
                    elif [[ "$STATUS" == "failed" ]]; then
                      log "Task failed"
                      exit 1
                    fi
                    sleep 30
                  done

Outputs:
